<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verano Frío | TONO APROBADO</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-landing: #0f0f0f; --text-landing: #f5f5f5; --bg-grid: #ffffff; --text-grid: #111111; --accent: #0047FF; --border-light: #e5e5e5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-landing); color: var(--text-landing); display: flex; flex-direction: column; min-height: 100vh; }
        #landing-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        h1.brand { font-family: 'Syne', sans-serif; font-size: 1.2rem; letter-spacing: 8px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        h2.title { font-family: 'Syne', sans-serif; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1; margin: 0 0 40px; text-transform: uppercase; }
        .btn { background: #fff; color: #000; padding: 20px 40px; border: none; font-family: 'Syne', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 50px; font-size: 1rem; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
        #grid-view { display: none; background: #fff; color: #000; padding: 40px 20px; }
        .grid-header { max-width: 1100px; margin: 0 auto 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .back { background: none; border: 1px solid #000; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .main-content { max-width: 1100px; margin: 0 auto; }
        .cat-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; color: var(--accent); margin: 40px 0 20px; display: flex; align-items: center; }
        .cat-title::after { content: ""; flex: 1; height: 1px; background: #eee; margin-left: 20px; }
        .sub-title { font-size: 0.8rem; color: #888; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        .color-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 30px; }
        .color-item { width: calc((100% - 60px) / 6); aspect-ratio: 1; border-radius: 6px; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; }
        .color-item:hover { transform: scale(1.1); z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .desc { background: #f9f9f9; padding: 25px; border-left: 4px solid #000; font-family: 'Syne', sans-serif; margin-top: 40px; }
        footer { padding: 30px; text-align: center; font-size: 0.7rem; opacity: 0.5; color: inherit; }
        .viewer { position: fixed; inset: 0; z-index: 999; display: none; flex-direction: column; }
        .viewer.active { display: flex; }
        .v-bg { position: absolute; inset: 0; }
        .v-close { position: absolute; top: 20px; right: 20px; background: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; font-weight: bold; }
        .v-footer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; padding: 15px 30px; border-radius: 30px; text-align: center; color: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        @media (max-width: 600px) { .color-item { width: calc((100% - 36px) / 4); } }
    </style>
</head>
<body>
    <section id="landing-view">
        <h1 class="brand">TONO APROBADO</h1>
        <h2 class="title">Verano Frío<br>Cool Summer</h2>
        <button class="btn" onclick="showGrid()">Ver Colorimetría</button>
    </section>
    <section id="grid-view">
        <div class="grid-header">
            <button class="back" onclick="location.reload()">← VOLVER</button>
            <div style="font-family:'Syne'; font-weight:800; text-transform:uppercase;">Verano Frío</div>
        </div>
        <div class="main-content" id="content"></div>
    </section>
    <footer>Todos los derechos reservados TonoAprobado. Prohibido su venta o uso sin previa autorización.</footer>
    <div class="viewer" id="viewer">
        <button class="v-close" onclick="closeV()">✕</button>
        <div class="v-bg" id="v-bg"></div>
        <div class="v-footer"><strong id="v-name"></strong><br><span id="v-hex"></span></div>
    </div>
    <script>
        const data = {
            star: "Neutros fríos claros|#F2F2F2:Cool Soft White,#E1E1E6:Light Cool Gray,#9AA0B2:Cool Taupe Gray,#4A4E57:Soft Charcoal;Rosas fríos empolvados|#F6E6EF:Cool Blush,#EBC1D6:Powder Pink,#C98AAE:Dusty Rose,#B24C6F:Cool Raspberry;Lilacs y violetas|#E2DAF2:Soft Lavender,#B9A9DE:Cool Lilac,#8A76B8:Muted Violet,#5E507F:Cool Plum;Azules y Verdes|#D8E4F2:Powder Blue,#B7C6EA:Cool Periwinkle,#7FA9C9:Soft Denim Blue,#3B5B86:Cool Navy,#C6D9DC:Blue Sage,#9CCFC2:Cool Mint,#7A9FA8:Muted Teal,#3C7F80:Cool Blue Green",
            comp: "Complementarios|#F4F7FA:C1,#E7ECF2:C2,#D3DAE6:C3,#BFC9D9:C4,#A9B4C8:C5,#8F9CB5:C6,#7C8AA6:C7,#6A7894:C8,#5A6A86:C9,#4B5C78:C10,#E9E3F1:C11,#D6CFE6:C12,#C2BCD9:C13,#AEA8CC:C14,#9A94BF:C15,#E6EEF0:C16,#D2E1E6:C17,#BED5DC:C18,#AAC9D1:C19,#96BDC6:C20,#D9E3DE:C21,#C6D6D2:C22,#B2CAC6:C23,#9EBDBA:C24,#8AB1AE:C25,#C9C9D3:C26,#B3B4C2:C27,#9DA0B1:C28,#878CA0:C29,#71788F:C30",
            avoid: "Cálidos / Amarillentos|#FF8C00:Orange,#FFD634:Warm Yellow,#C19A6B:Camel;Muy Oscuros|#000000:Pure Black,#1A1A1A:Ink Black;Muy Saturados|#FF0000:True Red,#00FF00:Neon Green,#00A7D1:Electric Turquoise",
            metal: "Recomendados|#C0C0C0:Silver,#EAEAEA:White Gold,#E5E4E2:Platinum,#E5E4E2:Rhodium;Evitar|#FFD700:Yellow Gold,#B87333:Copper,#CD7F32:Bronze,#B76E79:Rose Gold",
            desc: "Frescura, frialdad y armonía. Tus colores son elegantes, suaves y carecen totalmente de calidez."
        };
        function showGrid() {
            document.getElementById('landing-view').style.display = 'none';
            document.getElementById('grid-view').style.display = 'block';
            document.body.style.backgroundColor = '#fff';
            document.body.style.color = '#000';
            render();
        }
        function render() {
            let h = '';
            h += renderSec('Colores Estrella', data.star, true);
            h += renderSec('Complementarios', data.comp);
            h += renderSec('Evitar', data.avoid);
            h += renderSec('Metales', data.metal);
            h += `<div class="desc">${data.desc}</div>`;
            document.getElementById('content').innerHTML = h;
        }
        function renderSec(t, d, acc) {
            let s = `<div class="cat-title" ${acc?'style="color:var(--accent)"':''}>${t}</div>`;
            d.split(';').forEach(g => {
                const [st, cols] = g.split('|');
                s += `<div class="sub-title">${st}</div><div class="color-grid">`;
                cols.split(',').forEach(c => {
                    const [hex, n] = c.split(':');
                    s += `<div class="color-item" style="background:${hex}" onclick="openV('${hex}','${n}')"></div>`;
                });
                s += `</div>`;
            });
            return s;
        }
        function openV(h, n) {
            document.getElementById('v-bg').style.backgroundColor = h;
            document.getElementById('v-name').innerText = n;
            document.getElementById('v-hex').innerText = h;
            document.getElementById('viewer').classList.add('active');
        }
        function closeV() { document.getElementById('viewer').classList.remove('active'); }
    </script>
</body>
</html>
